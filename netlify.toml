# ===========================================
# NETLIFY CONFIGURATION - ki-automatisieren.de
# Trailing Slash + Pretty URLs handled natively by Netlify
# Edge Function REMOVED (2026-03-30) — was redundant, caused double-redirect chains
# See Pinecone: astro-netlify-trailing-slash-redirect-loop
# Last updated: 2026-03-30
# ===========================================

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Pretty URLs: Netlify handles trailing slashes + .html cleanup + lowercase natively
[build.processing.html]
  pretty_urls = true

# Note: Edge Function url-normalize REMOVED — Netlify Pretty URLs does everything natively
# Note: All redirects in public/_redirects
# Note: All headers in public/_headers (single source of truth)
