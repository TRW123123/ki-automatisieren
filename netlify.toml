# ===========================================
# NETLIFY CONFIGURATION - ki-automatisieren.de
# URL Normalization via Edge Function
# Last updated: 2026-02-05
# ===========================================

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Edge Function for URL normalization (SEO)
# Handles: trailing slashes, lowercase, .html cleanup
[[edge_functions]]
  path = "/*"
  function = "url-normalize"

# Note: Additional redirects in public/_redirects

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Asset Caching
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML: kein Cache
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
